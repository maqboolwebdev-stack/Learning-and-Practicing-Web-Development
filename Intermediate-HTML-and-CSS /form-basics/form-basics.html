<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Basics</title>
    <style>
      h1 {
        color: red;
        width: fit-content;
      }
    </style>
  </head>
  <body>
    <form action="https://httpbin.org/post" method="post">
        <fieldset>
            <legend>Contact Details</legend>
      <div>
        <label for="first_name">First Name:</label>
        <input
          type="text"
          id="first_name"
          name="first_name"
          required
          placeholder="John"
        />
      </div>
      <div>
        <label for="last_name">Last Name:</label>
        <input type="text" id="last_name" name="last_name" placeholder="Mee" />
      </div>
      <div>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" />
      </div>
      <div>
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          name="email"
        />
      </div>
      <div>
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password..."
        />
      </div>
      <div>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="10" max="120" required />
      </div>
      </fieldset>
      <fieldset>
      <legend>What would like to have</legend>
      <select name="Car">
        <option value="mercedes">Mercedes</option>
        <option value="tesla">Tesla</option>
        <option value="volvo">Volvo</option>
        <option value="bmw">BMW</option>
        <option value="mini">Mini</option>
        <option value="ford">Ford</option>
      </select>
      <select name="fashion">
        <optgroup label="Clothing">
          <option value="t_shirt">T-Shirts</option>
          <option value="sweater">Sweaters</option>
          <option value="coats">Coats</option>
        </optgroup>
        <optgroup label="Foot Wear">
          <option value="sneakers">Sneakers</option>
          <option value="boots">Boots</option>
          <option value="sandals">Sandals</option>
        </optgroup>
      </select>

      <div>
        <textarea name="feedback" id="feedback" rows="20" cols="50">
Some initial data</textarea
        >
      </div>
      <h1>Ticket Type</h1>
      <div>
        <input type="radio" id="child" name="ticket_type" value="child" />
        <label for="child">Child</label>
      </div>

      <div>
        <input type="radio" id="adult" name="ticket_type" value="adult" />
        <label for="adult">Adult</label>
      </div>

      <div>
        <input type="radio" id="senior" name="ticket_type" value="senior" />
        <label for="senior">Senior</label>
      </div>

      <h1>Pizza Toppings</h1>

      <div>
        <input type="checkbox" id="sausage" name="topping" value="sausage" />
        <label for="sausage">Sausage</label>
      </div>

      <div>
        <input type="checkbox" id="onions" name="topping" value="onions" />
        <label for="onions">Onions</label>
      </div>

      <div>
        <input
          type="checkbox"
          id="pepperoni"
          name="topping"
          value="pepperoni"
        />
        <label for="pepperoni">Pepperoni</label>
      </div>

      <div>
        <input
          type="checkbox"
          id="mushrooms"
          name="topping"
          value="mushrooms"
        />
        <label for="mushrooms">Mushrooms</label>
      </div>

      <div>
        <input type="checkbox" id="newsletter" name="news_letter" />
        <label for="newsletter">Send me the news letter</label>
      </div>
      </fieldset>

      <div>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </div>
    </form>

    <label for="name">What is your Name?</label>
    <input class="input" type="text" id="name" name="name" />
    <button class="greeting">Greet Me</button>
    <h1></h1>
    <script>
      const input = document.querySelector(".input");
      const button = document.querySelector(".greeting");
      const h1 = document.querySelector("h1");

      button.addEventListener("click", function () {
        h1.textContent = `Hello ${input.value.toUpperCase()}`;
        input.value = "";
      });
    </script>
  </body>
</html>
