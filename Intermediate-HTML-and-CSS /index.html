<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <details>
      <summary>Who I am ?</summary>
      <p>
        I am a <b>Programmer</b>. <code>Hard working</code> and
        <code> disciplined.</code><br />
        with growth mindset. that believe in <em>learning</em>
      </p>
    </details>

    <button command="show-modal" commandfor="my-dialog">Open dialog</button>

    <dialog id="my-dialog">
      <p>This dialog was opened using an invoker command.</p>
      <button commandfor="my-dialog" command="close">Close</button>
    </dialog>

    <!-- element.className -->
    <div class="box"></div>

    <!-- element#idName -->
    <div id="box">
      <span class="id"></span>
    </div>

    <!-- element.class.class#id
      with . will class and with # create id and even multiple -->

    <div class="first one" id="number1"></div>

    <!-- with emmet can produce child element
       element.class>element.class -->

    <div class="para">
      <p class="info"></p>
    </div>

    <!-- parent>child>child is more powerful -->

    <header>
      <nav>
        <ul>
          <li></li>
          <li></li>
          <li></li>
        </ul>
      </nav>
    </header>

    <!-- with + can create multiple element and child as a same time 
     element>child^element+element -->

     <header>
      <nav></nav>
     </header>
     <main></main>
     <footer></footer>

  </body>
</html>
