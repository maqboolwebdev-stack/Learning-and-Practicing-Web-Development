<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <link rel="stylesheet" href="tables.css">
</head>
<body>
    <table>
        <tr>
            <th>First heading</th>
            <th>Second heading</th>
        </tr>
        <tr>
            <td>This is a cell</td>
            <td>This is another cell</td>
        </tr>
    </table>

    <table class="second-table">
        <tr>
            <th>Person</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Mark</td>
            <td>23</td>
        </tr>
        <tr>
            <td>Maria</td>
            <td>26</td>
        </tr>
        <tr>
            <td>Musk</td>
            <td>33</td>
        </tr>
        <tr>
            <td>john</td>
            <td>21</td>
        </tr>
    </table>
</body>
</html>
